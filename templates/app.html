{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{% static 'css/app.css' %}" />

    <title>App</title>
  </head>
  <body>
    <div>
      <form method="POST">
        {% csrf_token %}
        <input type="text" placeholder="Todo name" name="name" />
        <input type="date" name="date" id=" " />
        <button onclick="submit">Save</button>
      </form>
      {% for d in data %}
      <div>
        <label>{{d.id}}</label>
        <label>{{d.name}}</label>
        <label>{{d.date}}</label>
        <a href="{% url 'edit' d.id %}">
          <button>Edit</button>
        </a>
        <form action="{% url 'delete' d.id %}" method="POST">
          {% csrf_token %}
          <button type="submit">Delete</button>
        </form>
      </div>
      {% endfor %}
    </div>
  </body>
</html>
